<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Rating</title>
</head>
<body>

<h1>Edit Rating</h1>

<h2>{{ book.title }}</h2>

<form action="{{ url_for('edit', id=book.id) }}" method="POST">

    <label>New Rating</label>
    <input
        name="rating"
        type="text"
        value="{{ book.rating }}"
    >

    <button type="submit">
        Change Rating
    </button>

</form>

</body>
</html>
